name: Daily Platform Health Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-platforms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pre-flight Check: Early detection of CI network issues
      - name: Pre-flight connectivity check
        run: |
          echo "🔍 Running pre-flight connectivity check..."
          if ! curl -sf --max-time 15 https://www.google.com > /dev/null; then
            echo "::error::Runner has no internet connectivity - skipping platform tests"
            exit 78
          fi
          echo "✅ Runner has internet connectivity"

      - name: Run platform checks
        id: test
        continue-on-error: true
        run: |
          set +e
          npx playwright test 2>&1 | tee test-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Extract error summary from output
          SUMMARY=$(tail -40 test-output.log | head -c 900)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          exit $EXIT_CODE

      - name: Upload artifacts on failure
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-results/**
          retention-days: 14

      # Send per-platform results to Lingera webhook (always, success or failure)
      - name: Report to Lingera Monitor
        if: always()
        env:
          MONITOR_WEBHOOK_URL: ${{ secrets.MONITOR_WEBHOOK_URL }}
          MONITOR_WEBHOOK_SECRET: ${{ secrets.MONITOR_WEBHOOK_SECRET }}
        run: |
          RESULTS_FILE="test-results/platform-results.json"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_ID="${{ github.run_id }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ -f "$RESULTS_FILE" ]; then
            echo "📊 Sending per-platform results to Lingera..."
            
            # Build batch payload from the JSON results file
            PAYLOAD=$(jq -c --arg run_url "$RUN_URL" --arg run_id "$RUN_ID" --arg ts "$TIMESTAMP" \
              '{ results: ., run_url: $run_url, run_id: $run_id, timestamp: $ts }' "$RESULTS_FILE")
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$MONITOR_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $MONITOR_WEBHOOK_SECRET" \
              -d "$PAYLOAD")
            
            echo "📤 Webhook response: HTTP $HTTP_CODE"
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::Webhook returned HTTP $HTTP_CODE"
            fi
          else
            echo "⚠️ No results file found - sending fallback failure report"
            
            # Fallback: report all platforms as failed (test suite itself crashed)
            PLATFORMS=("chatgpt" "claude" "grok" "gemini" "perplexity" "deepseek")
            RESULTS="[]"
            for p in "${PLATFORMS[@]}"; do
              RESULTS=$(echo "$RESULTS" | jq -c \
                --arg p "$p" \
                --arg msg "Test suite crashed before completing checks" \
                '. + [{ "platform": $p, "status": "failed", "error_message": $msg, "error_category": "unknown", "response_time_ms": 0 }]')
            done
            
            PAYLOAD=$(echo "$RESULTS" | jq -c \
              --arg run_url "$RUN_URL" --arg run_id "$RUN_ID" --arg ts "$TIMESTAMP" \
              '{ results: ., run_url: $run_url, run_id: $run_id, timestamp: $ts }')
            
            curl -s -X POST "$MONITOR_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $MONITOR_WEBHOOK_SECRET" \
              -d "$PAYLOAD"
            
            echo "📤 Fallback report sent"
          fi
          
          echo "\n📋 Results summary:"
          if [ -f "$RESULTS_FILE" ]; then
            cat "$RESULTS_FILE" | jq -r '.[] | "  " + (if .status == "ok" then "✅" else "❌" end) + " " + .platform + " (" + (.response_time_ms | tostring) + "ms)"'
          fi
