name: Daily Platform Health Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-platforms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pre-flight Check: Frühes Erkennen von CI-Netzwerkproblemen
      - name: Pre-flight connectivity check
        run: |
          echo "🔍 Running pre-flight connectivity check..."
          if ! curl -sf --max-time 15 https://www.google.com > /dev/null; then
            echo "::error::Runner has no internet connectivity - skipping platform tests"
            exit 78
          fi
          echo "✅ Runner has internet connectivity"

      - name: Run platform checks
        id: test
        continue-on-error: true
        run: |
          set +e
          OUTPUT=$(npx playwright test 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "error_output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" | tail -40 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload artifacts on failure
        if: steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-results/**
          retention-days: 14

      - name: Notify Abacus Monitor on failure
        if: steps.test.outcome == 'failure'
        env:
          MONITOR_WEBHOOK_URL: ${{ secrets.MONITOR_WEBHOOK_URL }}
          ERROR_OUTPUT: ${{ steps.test.outputs.error_output }}
        run: |
          CLEAN_ERROR=$(echo "$ERROR_OUTPUT" | tail -25 | sed 's/"/\\"/g' | tr '\n' ' ' | head -c 900)

          if echo "$ERROR_OUTPUT" | grep -qiE "timeout|exceeded"; then
            CATEGORY="timeout"
          elif echo "$ERROR_OUTPUT" | grep -qiE "selector|locator.*not found|unable to locate"; then
            CATEGORY="selector_not_found"
          elif echo "$ERROR_OUTPUT" | grep -qiE "net::ERR|ECONNREFUSED|network|connection refused"; then
            CATEGORY="network_error"
          elif echo "$ERROR_OUTPUT" | grep -qiE "login|sign.?in|auth|redirect.*login"; then
            CATEGORY="login_wall"
          else
            CATEGORY="unknown"
          fi

          curl -s -X POST "$MONITOR_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "platform": "multiple",
            "error_message": "$CLEAN_ERROR",
            "error_category": "$CATEGORY",
            "screenshot_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          echo "📤 Abacus Monitor alert sent (category: $CATEGORY)"
