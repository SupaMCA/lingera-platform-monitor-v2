      - name: Notify Abacus Monitor on failure
        if: steps.test.outcome == 'failure'
        env:
          MONITOR_WEBHOOK_URL: ${{ secrets.MONITOR_WEBHOOK_URL }}
          ERROR_OUTPUT: ${{ steps.test.outputs.error_output }}
        run: |
          # ============================================
          # Improved Error Extraction & Categorization
          # ============================================

          # Extract the most relevant part of the error (last 20 lines, cleaned)
          CLEAN_ERROR=$(echo "$ERROR_OUTPUT" | tail -20 | sed 's/"/\\"/g' | tr '\n' ' ' | head -c 900)

          # Error Categorization
          if echo "$ERROR_OUTPUT" | grep -qiE "timeout|exceeded"; then
            CATEGORY="timeout"
          elif echo "$ERROR_OUTPUT" | grep -qiE "selector|locator.*not found|unable to locate"; then
            CATEGORY="selector_not_found"
          elif echo "$ERROR_OUTPUT" | grep -qiE "net::ERR|ECONNREFUSED|network|connection refused"; then
            CATEGORY="network_error"
          elif echo "$ERROR_OUTPUT" | grep -qiE "login|sign.?in|auth|redirect.*login"; then
            CATEGORY="login_wall"
          else
            CATEGORY="unknown"
          fi

          curl -s -X POST "$MONITOR_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "platform": "multiple",
            "error_message": "$CLEAN_ERROR",
            "error_category": "$CATEGORY",
            "screenshot_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          echo "📤 Abacus Monitor alert sent (category: $CATEGORY)"
