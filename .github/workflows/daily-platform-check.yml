name: Daily Platform Health Check

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check-platforms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run platform checks
        run: npx playwright test
        continue-on-error: true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts
          path: test-results/**
          retention-days: 14

      - name: Create GitHub Issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "❌ Platform Check Failed" \
            --body "**Ein Plattform-Check ist fehlgeschlagen.**\n\n**Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n**Artifacts (Screenshots):** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts\n\nBitte analysieren und ggf. Selectors anpassen." \
            --label "platform-check-failure"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
